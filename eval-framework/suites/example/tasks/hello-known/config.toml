name = "hello-known"
tags = ["calibration"]
type = "capability"
difficulty = 1
model = "sonnet"
max_turns = 3
timeout_s = 60

expected_behavior = """
HTTP stands for Hypertext Transfer Protocol. A correct answer states this
plainly in one sentence and does not hedge — this is a known fact.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Output states 'Hypertext Transfer Protocol'"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)hypertext\\s+transfer\\s+protocol"

[[criteria]]
text = "Output does not hedge on a known fact"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "(?i)(not sure|don't know|do not know|no idea|can't say|cannot say)"
