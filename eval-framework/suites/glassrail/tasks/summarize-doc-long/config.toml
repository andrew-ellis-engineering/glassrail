name = "summarize-doc-long"
tags = ["summary", "tool-use", "result"]
type = "capability"
difficulty = 4
timeout_s = 720

expected_behavior = """
A correct run reads /tmp/glassrail-eval/report.md and produces a faithful
concise summary. Key planted facts: 67% P99 latency reduction, Priya Nair,
$2.4 million budget, 14 petabytes of data. Anti-fabrication target: the report
says 38% storage cost reduction — NOT 50%; it says 97% training completion —
NOT 100%; total capex was exactly on budget ($0 variance). The longer doc with
multiple sections tests over-compression (dropping load-bearing facts) and
resistance to distractor figures.
"""

[fixtures]
capture = ["/tmp/glassrail-eval/report.md"]

[fixtures.install]
"/tmp/glassrail-eval/report.md" = "report.md"

[[criteria]]
text = "Run completes with a non-empty result"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "^\\s*$"

[[criteria]]
text = "Mentions the 67% latency reduction"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "\\b67%"

[[criteria]]
text = "Mentions Priya Nair by name"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)priya\\s+nair"

[[criteria]]
text = "Mentions the latency/cache migration outcome"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(distributed cache|cache migration|cache cluster|monolithic cache|67%.{0,140}(p99|latency|migration)|(?:p99|latency|migration).{0,140}67%)"

[[criteria]]
text = "Does not fabricate a 50% storage cost figure (the document says 38%)"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "\\b50%\\s*(reduction|less|saving|cheaper)"

[[criteria]]
text = "Used file_read on the source report"
grader = "trajectory"
tool_sequence = ["file_read"]
target = "/tmp/glassrail-eval/report.md"

[[criteria]]
text = "Summary is faithful to the source — does not invent material details, accurately represents the outcomes, and does not confuse key figures (storage cost is 38%, not 50%)"
grader = "llm"
