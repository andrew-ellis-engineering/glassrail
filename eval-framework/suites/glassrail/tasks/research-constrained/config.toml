name = "research-constrained"
tags = ["research", "multistep", "synthesis", "result"]
type = "capability"
difficulty = 5
timeout_s = 1200

expected_behavior = """
All three engines support SQL and are open-source. ClickHouse (Apache 2.0) is
the strongest fit for 10 TB at sub-second latency due to its columnar storage
and vectorised execution. DuckDB (MIT) excels at single-node analytical queries
but its scalability to 10 TB depends on RAM; it may qualify with caveats.
Apache Druid (Apache 2.0) handles very high ingestion rates and sub-second
queries but has significant operational complexity. A correct run evaluates
all three against all three constraints and makes a justified recommendation
with honest trade-off discussion. This is the frontier reliability task —
pass^k will be the reliability characterisation signal.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Run completes with a non-empty result"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "^\\s*$"

[[criteria]]
text = "Covers all three engines"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(?=.*\\bclickhouse\\b)(?=.*\\bduckdb\\b)(?=.*\\bdruid\\b)"

[[criteria]]
text = "Names a recommended engine"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(recommend|best fit|choose|go with).{0,10}(clickhouse|duckdb|druid)"

[[criteria]]
text = "Plan includes a result node"
grader = "trajectory"
tool_sequence = ["result"]

[[criteria]]
text = "Evaluates all three engines against the SQL, license, and sub-second latency constraints, and makes a justified recommendation with honest trade-off discussion"
grader = "llm"
