name = "reason-multistep-calc"
tags = ["reasoning", "multistep", "result"]
type = "capability"
difficulty = 4
timeout_s = 720

expected_behavior = """
Step-by-step:
  1. Widgets in 8 hours: 120/hr × 8 hr = 960 widgets
  2. Full crates: floor(960 / 600) = 1 full crate
  3. Widgets in full crates: 1 × 600 = 600 widgets
  4. Weight: 600 × 250 g = 150,000 g = 150 kg

A correct run reaches 1 full crate and 150 kg. An intermediate slip (e.g.
treating 960/600 as 1.6 crates without flooring) changes the weight, so
pass^k will sag on this task before it sags on simpler ones.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Run completes with a non-empty result"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "^\\s*$"

[[criteria]]
text = "States 1 full crate"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(\\b1\\b.{0,80}(crate|full)|(number_of_full_crates|full_crates|number_of_crates)\"?\\s*[:=]\\s*1)"

[[criteria]]
text = "States total weight of 150 kg"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(\\b150\\s*(kg|kilogram)|(total_weight_in_kilograms|total_weight_kg|total_weight_in_kg)\"?\\s*[:=]\\s*150)"

[[criteria]]
text = "Plan includes a result node"
grader = "trajectory"
tool_sequence = ["result"]

[[criteria]]
text = "Correctly concludes 1 full crate and 150 kg"
grader = "llm"
