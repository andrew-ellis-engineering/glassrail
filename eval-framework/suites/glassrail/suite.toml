[suite]
name = "glassrail"
description = "End-to-end evals of the glassrail planner + executor over its own tier routing."
# Drive the agent through its headless CLI (a subprocess, like claude -p). The
# agent routes through ITS OWN tier config, so this benchmarks the model(s) you
# actually ship — tier 0 is the local MLX server by default. To benchmark the
# shipped model, point your tiers at it (config.toml / GLASSRAIL_TIER*__ env) or
# pass default_model below, which overrides tier 0's model per run.
default_backend = "glassrail-cli"
default_model = "qwen3.6-35b-moe"   # → `glassrail run --model qwen3.6-35b-moe` (tier-0 override)

# The judge is independent of the subject: keep it on a cheap Claude model so
# semantic criteria are graded consistently regardless of the model under test.
# Point it at MLX instead with `--grader-backend openai-compat`.
default_grader_model = "haiku"
default_grader_backend = "claude-cli"

default_timeout_s = 600
promotion_threshold = 5  # consecutive clean runs to qualify for regression

[backend]
# How to invoke the agent. Uses `uv run` so the suite works from the repo
# without activating the venv (uv walks up to the project's pyproject.toml).
# If `glassrail` is already on PATH (installed package / activated venv), you can
# simplify this to ["glassrail", "run"].
command = ["uv", "run", "glassrail", "run"]

# Pin the agent's tier routing for a hermetic, offline eval. Layered onto the
# inherited environment for each subject subprocess (GLASSRAIL_* settings).
#
# Why: tier 0's default per-call timeout is 10s — too short for a local MLX
# model, so calls were timing out and the router fell through to the cloud
# tiers (OpenRouter), which have no API key → 401s that masked the real cause.
# Here we (a) give tier 0 a generous timeout and (b) point tiers 1–3 at the
# SAME local server, so any tier-0 hiccup retries locally instead of reaching
# out to a paid/keyed endpoint. Fully offline; no temporal-firewall risk.
[backend.env]
GLASSRAIL_TIER0__TIMEOUT_S = "600"
GLASSRAIL_TIER1__BASE_URL = "http://localhost:8090/v1"
GLASSRAIL_TIER1__MODEL = "qwen3.6-35b-moe"
GLASSRAIL_TIER1__TIMEOUT_S = "600"
GLASSRAIL_TIER2__BASE_URL = "http://localhost:8090/v1"
GLASSRAIL_TIER2__MODEL = "qwen3.6-35b-moe"
GLASSRAIL_TIER2__TIMEOUT_S = "600"
GLASSRAIL_TIER3__BASE_URL = "http://localhost:8090/v1"
GLASSRAIL_TIER3__MODEL = "qwen3.6-35b-moe"
GLASSRAIL_TIER3__TIMEOUT_S = "600"
