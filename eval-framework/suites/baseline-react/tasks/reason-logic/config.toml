name = "reason-logic"
tags = ["reasoning", "result"]
type = "capability"
difficulty = 3
timeout_s = 420

expected_behavior = """
Deduction: Bob has dog. Alice doesn't have cat, so Alice has fish or dog. Since
Bob has dog, Alice has fish. That means Carol has cat. Answer: Alice owns the
fish. A correct run reaches this conclusion and names Alice explicitly. The
node-type choice (think vs synthesis) is the planner's discretion and not
asserted; only the final answer is graded.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Run completes with a non-empty result"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "^\\s*$"

[[criteria]]
text = "Names Alice as the owner of the fish"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)\\balice\\b"

[[criteria]]
text = "States Alice owns the fish (not cat or dog)"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(alice.{0,30}fish|fish.{0,30}alice)"

[[criteria]]
text = "Correctly deduces that Alice owns the fish through valid logical steps"
grader = "llm"
