name = "summarize-doc-long"
tags = ["summary", "tool-use", "result"]
type = "capability"
difficulty = 4
timeout_s = 720

expected_behavior = """
A correct run reads /tmp/dagagent-eval/report.md and produces a faithful
concise summary. Key planted facts: 67% P99 latency reduction, Priya Nair,
$2.4 million budget, 14 petabytes of data. Anti-fabrication target: the report
says 38% storage cost reduction — NOT 50%; it says 97% training completion —
NOT 100%; total capex was exactly on budget ($0 variance). The longer doc with
multiple sections tests over-compression (dropping load-bearing facts) and
resistance to distractor figures.
"""

[fixtures]
capture = []

[fixtures.install]
"/tmp/dagagent-eval/report.md" = "report.md"

[[criteria]]
text = "Run completes with a non-empty result"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "^\\s*$"

[[criteria]]
text = "Mentions the 67% latency reduction"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "\\b67%"

[[criteria]]
text = "Mentions Priya Nair or the cache migration"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(priya\\s+nair|distributed cache|cache migration)"

[[criteria]]
text = "Does not fabricate a 50% storage cost figure (the document says 38%)"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "\\b50%\\s*(reduction|less|saving|cheaper)"

[[criteria]]
text = "Used file_read on the source report"
grader = "trajectory"
tool_sequence = ["file_read"]
target = "/tmp/dagagent-eval/report.md"

[[criteria]]
text = "Summary is faithful — preserves the planted facts (67% latency, Priya Nair, $2.4M budget, carry-over risks) and does not invent material details"
grader = "llm"
