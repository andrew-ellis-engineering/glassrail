name = "hemisphere-north"
tags = ["decision", "reasoning", "control-pair"]
type = "capability"
difficulty = 4
control_for = "hemisphere-south"
timeout_s = 270

expected_behavior = """
Madrid is in the northern hemisphere. Boreal winter runs December through
February. A correct run uses a decision node to branch on the hemisphere result,
then names a month in the December-February range. Control twin of
hemisphere-south: guards against a model that always picks the same hemisphere
regardless of the city. Both tasks produce the same month range (Dec-Feb is
both austral summer and boreal winter), so the hemisphere identification and
the LLM criterion are the controls that differentiate them.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Run completes with a non-empty result"
grader = "deterministic"
check = "not_regex"
target = "__result_text__"
value = "^\\s*$"

[[criteria]]
text = "Identifies northern hemisphere"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)\\bnorthern\\b"

[[criteria]]
text = "Names a month that is boreal winter (December, January, or February)"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)(december|january|february)"

[[criteria]]
text = "Plan used a decision node to branch on the hemisphere"
grader = "trajectory"
tool_sequence = ["decision"]

[[criteria]]
text = "Correctly places Madrid in the northern hemisphere and names a valid boreal winter month"
grader = "llm"
