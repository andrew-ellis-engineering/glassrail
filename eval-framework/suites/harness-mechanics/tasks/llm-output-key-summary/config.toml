name = "llm-output-key-summary"
tags = ["llm-node", "harness-mechanics", "output-key"]
type = "regression"
difficulty = 1

expected_behavior = """
A SUMMARY node reads the 'summary' field (not 'output') from the model response.
The value must appear in the node's trajectory output (via node:<id> grader).
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Summary node completed"
grader = "trajectory"
node_id = 1
expect_status = "completed"

[[criteria]]
text = "Summary output contains the scripted text"
grader = "deterministic"
check = "regex"
target = "node:1"
value = "scripted summary sentinel"
