name = "decision-skip-no-start"
tags = ["decision", "harness-mechanics", "branch-propagation", "events"]
type = "regression"
difficulty = 1

expected_behavior = """
Skipped nodes must emit NodeFinished(SKIPPED) but must NOT emit NodeStarted.
The trajectory entry for a skipped node should show status=skipped.
This is the event-stream companion to decision-skip-untaken.
"""

