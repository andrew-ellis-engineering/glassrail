capture = []

[fixtures.install]

[[criteria]]
text = "Skipped node (id=2) shows as skipped in trajectory"
grader = "trajectory"
node_id = 2
expect_status = "skipped"

[[criteria]]
text = "Taken branch node (id=3) completed"
grader = "trajectory"
node_id = 3
