name = "llm-retry-recovers"
tags = ["llm-node", "harness-mechanics", "resilience"]
type = "regression"
difficulty = 1

expected_behavior = """
A retryable provider-unavailable failure during a RESULT node's main LLM call
is retried once, and the retry output becomes the task final_output.

Fixture caveat: the exec-plan subject points all four tiers at the same
responses file, but each tier gets its own provider queue. This task disables
tier escalation so the retry stays on tier 0 and consumes the second line.
"""

[backend_config.env]
GLASSRAIL_TIER0__KIND = "scripted"
GLASSRAIL_TIER1__KIND = "scripted"
GLASSRAIL_TIER2__KIND = "scripted"
GLASSRAIL_TIER3__KIND = "scripted"
GLASSRAIL_RESILIENCE__ESCALATE_TIER_ON_RETRY = "false"

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Result node completed after retry"
grader = "trajectory"
node_id = 1
expect_status = "completed"

[[criteria]]
text = "Recovered result appears in final output"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "retry recovered sentinel"
