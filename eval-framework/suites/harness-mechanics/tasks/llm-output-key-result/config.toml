name = "llm-output-key-result"
tags = ["llm-node", "harness-mechanics", "output-key"]
type = "regression"
difficulty = 1

expected_behavior = """
A RESULT node reads the 'output' field from the model response and that
becomes the final_output of the task.
"""

[fixtures]
