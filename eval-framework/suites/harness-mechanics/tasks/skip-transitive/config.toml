name = "skip-transitive"
tags = ["execution-model", "harness-mechanics", "branch-propagation", "open-question"]
type = "regression"
difficulty = 2

expected_behavior = """
Open question (HARNESS_NODE_EVAL_SPEC.md §8.2): a node that is downstream of a
skipped branch node but is NOT itself listed in the branch is currently not
automatically skipped by _record_branch_decision — it will attempt to run with
missing context_needed outputs.

This task pins the current observable behaviour so any change to skip
propagation is detected.  Plan shape: DECISION(yes→[2], no→[3]) → node 4
depends on node 3 but is not listed in any branch.

When 'yes' branch is taken: node 3 is SKIPPED, node 4 has context_needed=[3].
Current expected behavior: node 4 still runs (with absent context from node 3).
This test pins that behavior; update expected_behavior if the spec changes.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Decision took 'yes' branch"
grader = "trajectory"
node_id = 1
expect_branch = "yes"

[[criteria]]
text = "Node 3 (untaken branch) is skipped"
grader = "trajectory"
node_id = 3
expect_status = "skipped"

[[criteria]]
text = "Node 4 (downstream of skipped node, not in branch list) still ran"
grader = "trajectory"
node_id = 4
expect_status = "completed"
