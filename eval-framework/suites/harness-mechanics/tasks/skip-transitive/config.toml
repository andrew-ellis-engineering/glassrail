name = "skip-transitive"
tags = ["execution-model", "harness-mechanics", "branch-propagation"]
type = "regression"
difficulty = 2

expected_behavior = """
When a node becomes ready and all of its non-decision context dependencies are
SKIPPED, it is auto-skipped instead of running with only skipped content.

Plan shape: DECISION(yes→[2], no→[3]) → node 4
depends on node 3 but is not listed in any branch.

When 'yes' branch is taken: node 3 is SKIPPED, node 4 has context_needed=[3].
Expected behavior: node 4 is also SKIPPED because every content dependency it
declares is skipped.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Decision took 'yes' branch"
grader = "trajectory"
node_id = 1
expect_branch = "yes"

[[criteria]]
text = "Node 3 (untaken branch) is skipped"
grader = "trajectory"
node_id = 3
expect_status = "skipped"

[[criteria]]
text = "Node 4 (downstream of only skipped content) is also skipped"
grader = "trajectory"
node_id = 4
expect_status = "skipped"
