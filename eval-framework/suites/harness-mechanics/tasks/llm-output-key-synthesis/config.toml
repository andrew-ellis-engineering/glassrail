name = "llm-output-key-synthesis"
tags = ["llm-node", "harness-mechanics", "output-key"]
type = "regression"
difficulty = 1

expected_behavior = """
A SYNTHESIS node reads the 'output' field from the model response.
The value must appear in the node's trajectory output (via node:<id> grader)
and also flow through to the final result text.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Synthesis node completed"
grader = "trajectory"
node_id = 1
expect_status = "completed"

[[criteria]]
text = "Synthesis output contains the scripted text"
grader = "deterministic"
check = "regex"
target = "node:1"
value = "scripted synthesis output sentinel"
