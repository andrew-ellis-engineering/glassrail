[suite]
name = "baseline-raw"
description = """
Raw-model comparison suite copied from suites/glassrail. It runs the same task
prompts through one OpenAI-compatible chat completion, with Glassrail-specific
trajectory criteria removed.

Set OPENROUTER_API_KEY before running:
  python3 run.py suite suites/baseline-raw --workers 5
"""
default_backend = "openai-compat"
default_model = "qwen/qwen3-8b"

default_grader_model = "anthropic/claude-haiku-4.5"
default_grader_backend = "openai-compat"
default_timeout_s = 120
promotion_threshold = 5

[backend]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"

[backend.extra_body]
reasoning = { effort = "none" }
provider = { require_parameters = true }

[judge]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"

[judge.extra_body]
temperature = 0
max_tokens = 256
