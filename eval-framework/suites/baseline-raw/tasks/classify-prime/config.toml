name = "classify-prime"
tags = ["decision", "control-pair"]
type = "capability"
difficulty = 2
timeout_s = 540

expected_behavior = """
97 is prime, and the largest prime smaller than it is 89. Baseline suites grade
only answer quality; Glassrail's matching task additionally grades explicit
decision-node usage.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Identifies 97 as prime"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)\\bprime\\b"

[[criteria]]
text = "Reports 89 as the largest smaller prime"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "\\b89\\b"

[[criteria]]
text = "Correctly classifies the number and gives the requested branch-specific value"
grader = "llm"
