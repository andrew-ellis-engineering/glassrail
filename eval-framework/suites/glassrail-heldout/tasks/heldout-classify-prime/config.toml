name = "heldout-classify-prime"
tags = ["decision", "heldout", "control-pair"]
type = "capability"
difficulty = 2
timeout_s = 120

expected_behavior = """
97 is prime, and the largest prime smaller than it is 89. The conditional
phrasing warrants a decision node rather than a generic direct answer. Control
twin of heldout-classify-composite.
"""

[fixtures]
capture = []

[fixtures.install]

[[criteria]]
text = "Identifies 97 as prime"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "(?i)\\bprime\\b"

[[criteria]]
text = "Reports 89 as the largest smaller prime"
grader = "deterministic"
check = "regex"
target = "__result_text__"
value = "\\b89\\b"

[[criteria]]
text = "Planner used a decision node"
grader = "trajectory"
tool_sequence = ["decision"]

[[criteria]]
text = "Correctly classifies the number and follows only the prime branch"
grader = "llm"
