[suite]
name = "glassrail-openrouter"
description = """
Same tasks as the glassrail suite, but all LLM tiers route through OpenRouter
instead of the local MLX servers. Use this to rule out local-infra issues and
iterate quickly — OpenRouter responses are seconds, not minutes.

Model is set via --model (default below). Any OpenRouter model slug works:
  anthropic/claude-haiku-4-5     # fast, cheap
  anthropic/claude-sonnet-4-5    # stronger
  qwen/qwen3-235b-a22b           # same family as local, cloud-hosted
  qwen/qwen3-8b                  # mirrors local tier-0

API key — set once in your shell before running. The glassrail-cli subject maps
this into the GLASSRAIL_TIER*__API_KEY variables for OpenRouter-pinned tiers:
  export OPENROUTER_API_KEY=sk-or-...

Then run:
  python3 run.py suite suites/glassrail-openrouter --workers 5
"""
default_backend = "glassrail-cli"
# Mirrors local tier-0. Override with --model to swap.
default_model = "qwen/qwen3-8b"

default_grader_model = "haiku"
default_grader_backend = "claude-cli"

# Cloud responses are fast — 120s is generous even for complex plans.
default_timeout_s = 120

promotion_threshold = 5

[backend]
command = ["uv", "run", "glassrail", "run"]

[backend.env]
# Raise the generation ceiling — local config.toml sets 8192 for Metal OOM
# protection but cloud has no such constraint; planner needs room for plan JSON.
GLASSRAIL_MAX_GENERATION_TOKENS = "32768"

# Tier 0 — fast execution (mirrors local qwen3-8b)
GLASSRAIL_TIER0__BASE_URL      = "https://openrouter.ai/api/v1"
GLASSRAIL_TIER0__MODEL         = "qwen/qwen3-8b"
GLASSRAIL_TIER0__TIMEOUT_S     = "60"
# Disable reasoning via the OpenRouter-native unified parameter.
# require_parameters=true ensures OpenRouter only routes to providers that
# actually honour reasoning.effort — without it, some providers silently ignore
# the parameter and stream all tokens into delta.reasoning (empty delta.content).
GLASSRAIL_TIER0__EXTRA_BODY    = '{"reasoning":{"effort":"none"},"provider":{"require_parameters":true}}'

# Tier 1 — planner + quality nodes (mirrors local qwen3.6-35b-moe)
GLASSRAIL_TIER1__BASE_URL      = "https://openrouter.ai/api/v1"
GLASSRAIL_TIER1__MODEL         = "qwen/qwen3.6-35b-a3b"
GLASSRAIL_TIER1__TIMEOUT_S     = "90"
GLASSRAIL_TIER1__EXTRA_BODY    = '{"reasoning":{"effort":"none"},"provider":{"require_parameters":true}}'

# Tiers 2 and 3 — pinned to tier-1 model, no surprise fallback spend.
GLASSRAIL_TIER2__BASE_URL      = "https://openrouter.ai/api/v1"
GLASSRAIL_TIER2__MODEL         = "qwen/qwen3.6-35b-a3b"
GLASSRAIL_TIER2__TIMEOUT_S     = "90"
GLASSRAIL_TIER2__EXTRA_BODY    = '{"reasoning":{"effort":"none"},"provider":{"require_parameters":true}}'

GLASSRAIL_TIER3__BASE_URL      = "https://openrouter.ai/api/v1"
GLASSRAIL_TIER3__MODEL         = "qwen/qwen3.6-35b-a3b"
GLASSRAIL_TIER3__TIMEOUT_S     = "90"
GLASSRAIL_TIER3__EXTRA_BODY    = '{"reasoning":{"effort":"none"},"provider":{"require_parameters":true}}'

# Planner timeouts — cloud inference is fast but 90s gives headroom.
GLASSRAIL_PLANNER_INITIAL_TIMEOUT_S = "90"
GLASSRAIL_PLANNER_RETRY_TIMEOUT_S   = "120"
GLASSRAIL_PLANNER_MIN_TIER          = "1"
