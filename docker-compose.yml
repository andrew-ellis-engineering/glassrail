# Development-only docker-compose.
# Production Dockerfile + image publish lands in Phase 1.

services:
  glassrail:
    image: python:3.12-slim
    container_name: glassrail-dev
    working_dir: /app
    volumes:
      - .:/app
      - glassrail-state:/var/lib/glassrail
    environment:
      GLASSRAIL_STATE_PATH: /var/lib/glassrail/state.sqlite
      GLASSRAIL_LOG_LEVEL: INFO
    ports:
      - "8888:8888"
    command: >
      bash -c "pip install uv &&
               uv sync --all-extras --group dev &&
               uv run uvicorn glassrail.gateways.rest:app --host 0.0.0.0 --port 8888 --reload"
    restart: unless-stopped

volumes:
  glassrail-state:
