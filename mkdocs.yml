site_name: Glassrail
site_description: A DAG-planning agent with deterministic tier routing and fresh context per node.
site_url: https://andrew-ellis-engineering.github.io/glassrail/
repo_url: https://github.com/andrew-ellis-engineering/glassrail
repo_name: andrew-ellis-engineering/glassrail

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Evals: evals.md
  - Observability: observability.md
  - Streaming events: streaming.md
  - Deployment: deployment.md
  - Terminal UI: tui.md
  - Roadmap: roadmap.md
  - Specs:
      - Overview: specs/index.md
      - Eval integrity: specs/eval-integrity.md
      - Parallel execution: specs/parallel-execution.md
      - Node resilience: specs/node-resilience.md
      - Routing table: specs/routing-table.md
      - Security baseline: specs/security-baseline.md
      - Serving hardening: specs/serving-hardening.md
      - Small fixes: specs/small-fixes.md
      - Comparative baselines: specs/comparative-baselines.md
  - Release:
      - Pre-release hygiene: release/pre-release-hygiene.md
      - PyPI release: release/pypi-release.md
      - Product website: release/product-website.md
      - Grassroots marketing: release/grassroots-marketing.md
