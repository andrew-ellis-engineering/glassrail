name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --all-extras --group dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --all-extras --group dev
      - name: pyright
        run: uv run pyright

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python }}
      - name: Install deps
        run: uv sync --all-extras --group dev
      - name: pytest
        run: uv run pytest --cov --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  eval-framework:
    name: Eval framework (offline validation)
    runs-on: ubuntu-latest
    # The vendored eval-framework is stdlib-only and lives outside the package's
    # pytest scope. Running real evals spends model budget, so CI only validates
    # that it imports, loads its suites, and dry-runs — no model calls.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        working-directory: eval-framework
        run: python -m compileall -q evalkit run.py
      - name: Load + dry-run suites
        working-directory: eval-framework
        run: |
          python run.py list suites/example
          python run.py list suites/glassrail
          python run.py suite suites/glassrail --dry-run
      - name: Stats smoke
        working-directory: eval-framework
        run: python -c "from evalkit.stats import pass_at_k; assert pass_at_k(3,1,3)==1.0"

  rust-tui:
    name: Rust TUI client
    runs-on: ubuntu-latest
    # The clients/tui crate is the ACP terminal client. It does not need Python
    # or a model server: format, lint (warnings as errors), build, and test.
    defaults:
      run:
        working-directory: clients/tui
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/tui
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Build
        run: uv build
      - name: Inspect distributions
        run: |
          tar -tf dist/glassrail-*.tar.gz | sort > /tmp/glassrail-sdist.txt
          python -m zipfile -l dist/glassrail-*.whl
      - name: Smoke test wheel
        run: |
          python -m venv /tmp/glassrail-wheel-smoke
          /tmp/glassrail-wheel-smoke/bin/python -m pip install dist/glassrail-*.whl
          /tmp/glassrail-wheel-smoke/bin/glassrail --help
          /tmp/glassrail-wheel-smoke/bin/glassrail run --help
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t glassrail:ci .
      - name: Smoke test (health, tools, non-root)
        run: |
          docker run -d --name glassrail -p 8000:8000 glassrail:ci
          for _ in $(seq 1 30); do
            curl -fsS http://localhost:8000/health && ok=1 && break
            sleep 1
          done
          if [ "$ok" != "1" ]; then docker logs glassrail; exit 1; fi
          curl -fsS http://localhost:8000/tools > /dev/null
          uid=$(docker exec glassrail id -u)
          if [ "$uid" != "10001" ]; then
            echo "expected non-root uid 10001, got $uid"; exit 1
          fi
          docker rm -f glassrail
