apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagagent
  namespace: inference
  labels:
    app: dagagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagagent
  template:
    metadata:
      labels:
        app: dagagent
    spec:
      containers:
        - name: dagagent
          image: dagagent/dagagent:latest
          imagePullPolicy: IfNotPresent
          command:
            - "uv"
            - "run"
            - "uvicorn"
            - "dagagent.gateways.rest.app:create_app"
            - "--factory"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - name: http
              containerPort: 8000
          env:
            # Point tier0 at the in-cluster MLX service rather than localhost.
            # In local dev, leave DAGAGENT_TIER0__BASE_URL unset to use the
            # default localhost:8080 from settings.py.
            - name: DAGAGENT_TIER0__BASE_URL
              value: "http://mlx-server.inference.svc.cluster.local:8080/v1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
